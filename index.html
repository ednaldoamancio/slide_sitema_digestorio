<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada Digestória - edhumanas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-color: #ffffff;
            --accent: #ff6b00; /* Laranja edhumanas */
            --accent-hover: #ff8533;
            --glass-bg: rgba(20, 20, 22, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-color: #f4f4f9;
            --text-color: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* Trava a tela para ser um App/Slide */
            transition: background-color 0.3s, color 0.3s;
        }

        /* ================= BACKGROUNDS ANIMADOS ================= */
        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #000;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            /* O segredo da responsividade nas imagens: cover! */
            background-size: cover; 
            background-position: center center;
            transition: opacity 1s ease-in-out;
            transform: scale(1.05); /* Inicia levemente ampliado */
        }

        .bg-slide.active {
            opacity: 0.6; /* Deixa a imagem mais escura para o texto brilhar */
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        .light-mode .bg-slide.active {
            opacity: 0.3; /* Mais claro no modo diurno */
        }

        @keyframes kenBurns {
            0% { transform: scale(1.05) translate(0, 0); }
            100% { transform: scale(1.15) translate(-2%, 2%); }
        }

        /* ================= CAMADA DE CONTEÚDO (RESPONSIVA) ================= */
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Permite clicar nos botões apenas */
        }

        /* Cabeçalho */
        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .brand {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(255, 107, 0, 0.4);
        }

        .theme-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: 600;
            transition: 0.2s;
        }

        /* Área Central do Texto */
        .slide-text-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Alinhado à esquerda no Desktop */
            padding: 40px 10%;
        }

        .text-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            
            /* Animação de entrada */
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .text-card.active {
            opacity: 1;
            transform: translateX(0);
        }

        .slide-tag {
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .slide-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .slide-desc {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-color);
            opacity: 0.9;
        }

        /* Área de Navegação */
        .nav-area {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .nav-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3);
            transition: 0.3s;
        }

        .nav-btn:disabled {
            background: #555;
            box-shadow: none;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: var(--accent-hover);
        }

        .progress-bar {
            flex: 1;
            margin: 0 30px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* ================= QUIZ FINAL ================= */
        #quiz-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            background: var(--bg-color);
        }

        .quiz-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--glass-border);
            color: var(--text-color);
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .quiz-btn:hover {
            border-color: var(--accent);
            background: rgba(255, 107, 0, 0.1);
        }

        /* ================= MEDIA QUERIES (RESPONSIVIDADE MÁXIMA) ================= */
        /* Celulares em pé (Portrait) */
        @media (max-width: 768px) {
            .slide-text-container {
                padding: 20px;
                align-items: flex-end; /* Joga o texto mais para baixo no celular para ver a imagem */
            }

            .text-card {
                width: 100%;
                padding: 25px;
                margin-bottom: 10px;
            }

            .slide-title {
                font-size: 2.2rem;
            }

            .slide-desc {
                font-size: 1.1rem;
            }

            .nav-area {
                padding: 15px 20px;
            }

            .nav-btn {
                width: 55px;
                height: 55px;
            }
            
            .brand {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="dark-mode">

    <div id="bg-container"></div>

    <div id="content-layer">
        <header>
            <div class="brand">edhumanas</div>
            <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        </header>

        <div class="slide-text-container">
            <div class="text-card" id="text-card">
                <div class="slide-tag" id="slide-tag">Nível 1</div>
                <h1 class="slide-title" id="slide-title">Hackeando o Sistema</h1>
                <p class="slide-desc" id="slide-desc">Um tour 3D em tempo real pelo corpo humano.</p>
            </div>
        </div>

        <div class="nav-area">
            <button class="nav-btn" id="btn-prev" onclick="changeSlide(-1)">❮</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <button class="nav-btn" id="btn-next" onclick="changeSlide(1)">❯</button>
        </div>
    </div>

    <div id="quiz-container">
        <div class="text-card active" style="width: 100%; max-width: 700px; text-align: center;">
            <div class="slide-tag" id="quiz-counter">Desafio Final</div>
            <h1 class="slide-title" id="quiz-question" style="font-size: 1.8rem; margin-bottom: 30px;">Carregando...</h1>
            <div id="quiz-options"></div>
            <div id="quiz-feedback" style="margin-top: 20px; font-weight: 800; font-size: 1.3rem; min-height: 30px;"></div>
            <button id="quiz-next-btn" class="theme-btn" style="margin-top: 20px; display: none; width: 100%; background: var(--accent); color: white; border:none; padding: 15px;" onclick="nextQuestion()">Próximo ❯</button>
        </div>
    </div>

    <script>
        // Conteúdo Desmontado: Cada slide tem sua imagem de fundo e seu texto em HTML
        const contentData = [
            { img: '01.jpg', tag: 'INÍCIO', title: 'Hackeando o Sistema Digestório', desc: 'Um tour 3D em tempo real. Você consegue gabaritar esse desafio?' },
            { img: '02.jpg', tag: 'VISÃO GERAL', title: 'Uma Máquina em 3 Setores', desc: 'Canal Superior (linha de frente), Canal Inferior (extração) e Órgãos Acessórios (suportes químicos).' },
            { img: '03.jpg', tag: 'A LARGADA', title: 'O start antes de engolir', desc: 'A mastigação tritura fisicamente, enquanto a amilase salivar começa a quebra química pesada dos carboidratos.' },
            { img: '04.jpg', tag: 'TRANSPORTE', title: 'Empurrado ativamente', desc: 'O alimento não cai pela gravidade. Movimentos peristálticos rítmicos forçam a descida pelo esôfago.' },
            { img: '05.jpg', tag: 'O TRITURADOR', title: 'Câmara de ácido implacável', desc: 'O estômago usa o Ácido Clorídrico para derrubar o pH e ativar enzimas que derretem as proteínas.' },
            { img: '06.jpg', tag: 'SEGURANÇA', title: 'Válvula Anti-Bug', desc: 'A Cárdia impede que o ácido corrosivo retorne e queime o esôfago. Quando falha, sentimos a azia.' },
            { img: '07.jpg', tag: 'EVOLUÇÃO', title: 'Metamorfose contínua', desc: 'A maçã vira Bolo Alimentar na boca, e se transforma em uma massa líquida e ácida chamada Quimo no estômago.' },
            { img: '08.jpg', tag: 'CHEAT CODES', title: 'Inteligência Química', desc: 'O Quimo é ácido demais. Os órgãos anexos injetam fluidos para que o corpo consiga processá-lo.' },
            { img: '09.jpg', tag: 'DETERGENTE NATURAL', title: 'A fábrica e o reservatório', desc: 'O fígado produz a Bile e a Vesícula Biliar a armazena, pronta para emulsificar (quebrar) as gorduras.' },
            { img: '10.jpg', tag: 'SUPER-HERÓI', title: 'O motor de enzimas', desc: 'O Pâncreas regula o açúcar com a insulina e joga um suco poderoso no duodeno para finalizar a digestão.' },
            // Substitua as próximas imagens conforme você gerar no seu software 3D
            { img: '11.jpg', tag: 'ABSORÇÃO', title: 'O Labirinto Delgado', desc: 'Com vilosidades incríveis, é aqui que os nutrientes finalmente invadem a corrente sanguínea.' },
            { img: '12.jpg', tag: 'RECICLAGEM', title: 'Resgate de Água', desc: 'O intestino grosso recupera a água e os minerais vitais, solidificando o que sobrou da operação.' },
            { img: '13.jpg', tag: 'MICROBIOMA', title: 'Aliados Ocultos', desc: 'Trilhões de bactérias boas moram no intestino, ajudando a extrair vitaminas e proteger a fronteira.' },
            { img: '14.jpg', tag: 'DESCARTE', title: 'Fim da Linha', desc: 'Os resíduos são compactados no reto aguardando a eliminação final do sistema.' },
            { img: '15.jpg', tag: 'SUCESSO', title: 'Operação Concluída', desc: 'A máquina humana transformou matéria externa em energia pura para você existir. Pronto para o Quiz?' }
        ];

        const quizData = [
            { q: 'Onde começa a digestão química dos carboidratos?', options: ['No estômago', 'Na boca', 'No intestino delgado', 'No esôfago'], ans: 1 },
            { q: 'Qual movimento empurra o alimento pelo esôfago?', options: ['Movimentos de rotação', 'Gravidade', 'Movimentos peristálticos', 'Contrações gástricas'], ans: 2 },
            { q: 'Qual ácido compõe o suco gástrico para digerir proteínas?', options: ['Ácido clorídrico', 'Ácido sulfúrico', 'Ácido cítrico', 'Ácido lático'], ans: 0 },
            { q: 'Onde ocorre a maior parte da absorção de nutrientes?', options: ['Intestino grosso', 'Estômago', 'Fígado', 'Intestino delgado'], ans: 3 },
            { q: 'Qual órgão produz a bile?', options: ['Fígado', 'Vesícula Biliar', 'Pâncreas', 'Estômago'], ans: 0 },
            { q: 'A bile atua como um detergente natural. Qual sua função?', options: ['Digerir proteínas', 'Emulsificar gorduras', 'Absorver água', 'Produzir insulina'], ans: 1 },
            { q: 'Qual órgão produz insulina e suco pancreático?', options: ['Fígado', 'Intestino delgado', 'Pâncreas', 'Vesícula biliar'], ans: 2 },
            { q: 'Onde ocorre a reabsorção de água e formação das fezes?', options: ['Intestino grosso', 'Intestino delgado', 'Reto', 'Estômago'], ans: 0 },
            { q: 'Qual o nome da massa alimentar após passar pelo estômago?', options: ['Bolo alimentar', 'Quimo', 'Quilo', 'Suco gástrico'], ans: 1 },
            { q: 'Qual estrutura impede o refluxo ácido para o esôfago?', options: ['Cárdia', 'Piloro', 'Epiglote', 'Faringe'], ans: 0 }
        ];

        let currentIndex = 0;
        let currentQuizIndex = 0;
        let quizAnswered = false;

        // INICIALIZAÇÃO DOS SLIDES
        function initApp() {
            const bgContainer = document.getElementById('bg-container');
            
            // Cria os fundos
            contentData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `bg-slide ${index === 0 ? 'active' : ''}`;
                div.style.backgroundImage = `url('${item.img}')`;
                bgContainer.appendChild(div);
            });

            updateView();
        }

        function changeSlide(direction) {
            const total = contentData.length;
            
            // Avança para o Quiz
            if (currentIndex === total - 1 && direction > 0) {
                startQuiz();
                return;
            }

            currentIndex += direction;
            
            // Limites de segurança
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= total) currentIndex = total - 1;

            updateView();
        }

        function updateView() {
            const data = contentData[currentIndex];
            const card = document.getElementById('text-card');
            
            // Animação de saída do texto
            card.classList.remove('active');
            
            // Troca o background (crossfade)
            document.querySelectorAll('.bg-slide').forEach((slide, idx) => {
                slide.classList.toggle('active', idx === currentIndex);
            });

            // Atualiza os dados após um curtíssimo delay para a animação do texto
            setTimeout(() => {
                document.getElementById('slide-tag').textContent = `${currentIndex + 1} / ${contentData.length} — ${data.tag}`;
                document.getElementById('slide-title').textContent = data.title;
                document.getElementById('slide-desc').textContent = data.desc;
                
                // Animação de entrada
                card.classList.add('active');
            }, 300);

            // Botões e Barra de Progresso
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            
            const fillWidth = ((currentIndex + 1) / contentData.length) * 100;
            document.getElementById('progress-fill').style.width = `${fillWidth}%`;

            const btnNext = document.getElementById('btn-next');
            if (currentIndex === contentData.length - 1) {
                btnNext.innerHTML = '🎮';
                btnNext.style.backgroundColor = '#00e5ff';
            } else {
                btnNext.innerHTML = '❯';
                btnNext.style.backgroundColor = 'var(--accent)';
            }
        }

        // ================= QUIZ E FOGOS DE ARTIFÍCIO =================
        function startQuiz() {
            document.getElementById('content-layer').style.display = 'none';
            document.getElementById('bg-container').style.filter = 'blur(10px)';
            document.getElementById('bg-container').style.opacity = '0.3';
            
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.style.display = 'flex';
            
            loadQuestion();
        }

        function loadQuestion() {
            quizAnswered = false;
            const q = quizData[currentQuizIndex];
            
            document.getElementById('quiz-counter').textContent = `Desafio ${currentQuizIndex + 1} de ${quizData.length}`;
            document.getElementById('quiz-question').textContent = q.q;
            document.getElementById('quiz-feedback').textContent = '';
            document.getElementById('quiz-next-btn').style.display = 'none';
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerHTML = `<strong>${['A', 'B', 'C', 'D'][i]}</strong> - ${opt}`;
                btn.onclick = () => handleAnswer(i, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(index, btnElement) {
            if (quizAnswered) return;
            quizAnswered = true;

            const q = quizData[currentQuizIndex];
            const feedback = document.getElementById('quiz-feedback');

            if (index === q.ans) {
                feedback.textContent = 'BOOM! Sistema Hackeado! 🔓';
                feedback.style.color = '#00e5ff';
                btnElement.style.borderColor = '#00e5ff';
                btnElement.style.background = 'rgba(0, 229, 255, 0.2)';
                explosaoFestiva(false);
            } else {
                feedback.textContent = 'Acesso Negado... ❌';
                feedback.style.color = '#ff4444';
                btnElement.style.borderColor = '#ff4444';
                btnElement.style.background = 'rgba(255, 68, 68, 0.2)';
                
                // Destaca a correta
                const btns = document.querySelectorAll('.quiz-btn');
                btns[q.ans].style.borderColor = '#00e5ff';
                btns[q.ans].style.color = '#00e5ff';
            }

            const nextBtn = document.getElementById('quiz-next-btn');
            nextBtn.style.display = 'block';
            if (currentQuizIndex === quizData.length - 1) {
                nextBtn.textContent = 'Ver Relatório Final';
            }
        }

        function nextQuestion() {
            if (currentQuizIndex < quizData.length - 1) {
                currentQuizIndex++;
                loadQuestion();
            } else {
                // Fim
                document.getElementById('quiz-counter').textContent = 'FIM DE JOGO';
                document.getElementById('quiz-question').textContent = 'Você domina a biologia!';
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-feedback').textContent = '';
                document.getElementById('quiz-next-btn').style.display = 'none';
                explosaoFestiva(true);
            }
        }

        // Criando as pequenas explosões de faíscas como fogos!
        function explosaoFestiva(grandFinale = false) {
            const duration = grandFinale ? 6000 : 1500;
            const end = Date.now() + duration;

            (function frame() {
                // Lança faíscas da esquerda e direita como fogos de artifício
                confetti({
                    particleCount: grandFinale ? 5 : 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#ff6b00', '#ffae00', '#ffffff', '#ff3300'],
                    shapes: ['circle'],
                    gravity: 1.5,
                    scalar: 0.8,
                    ticks: 200
                });
                confetti({
                    particleCount: grandFinale ? 5 : 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#00e5ff', '#ffffff', '#0099ff'],
                    shapes: ['circle'],
                    gravity: 1.5,
                    scalar: 0.8,
                    ticks: 200
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Modo Noturno / Claro
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('theme-btn');
            if (document.body.classList.contains('light-mode')) {
                btn.textContent = '☀️';
            } else {
                btn.textContent = '🌙';
            }
        }

        // Dá o play
        window.onload = initApp;
    </script>
</body>
</html>
